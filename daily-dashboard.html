<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ece4;--paper:#faf8f4;--ink:#2a2118;--ink2:#5c5043;--ink3:#a0907a;--border:#ddd5c4;
  --c1:#e05c3a;--c1b:#fdeee9;--c2:#d4850a;--c2b:#fef3e0;--c3:#5a8f5a;--c3b:#eaf3ea;
  --ca:#3a7bd4;--cab:#e8f0fc;--cb:#9b59b6;--cbb:#f3eafb;
  --cc:#27a37a;--ccb:#e4f7f0;--cd:#c0392b;--cdb:#fcecea;
  --rt:#e8a020;--rtb:#fff8ec;--pg:#3a7bd4;--dy:#7b5ea7;--dyb:#f5f0fc;
  --r:10px;--sh:0 2px 8px rgba(42,33,24,.08);
  --hh:56px;--th:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);display:flex;flex-direction:column}

/* HEADER */
.hd{height:var(--hh);background:var(--ink);display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0;z-index:10}
.hd-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:500;color:#f5f0e8}
.hd-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.hd-nav button{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.hd-nav button:active{background:rgba(255,255,255,.15)}
.hd-date{font-family:'IBM Plex Mono',monospace;font-size:13px;color:rgba(255,255,255,.5);padding:4px 8px;border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;position:relative}
.hd-date input[type=date]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.sync-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.55);padding:5px 10px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;white-space:nowrap}
.sync-btn:active{background:rgba(255,255,255,.1)}
.gist-status{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0}
.gist-status.ok{background:#34c978}
.gist-status.err{background:#e05c3a}
.gist-status.loading{background:#d4850a;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--th) + 14px);display:flex;flex-direction:column;gap:12px}
.page{display:none;flex-direction:column;gap:12px}
.page.active{display:flex}

/* CARD */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ch{display:flex;align-items:center;gap:8px;padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.clbl{font-size:15px;font-weight:500;letter-spacing:.06em;color:var(--ink2)}
.csub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink3);margin-left:auto}
.edit-btn{margin-left:auto;background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--ink3);cursor:pointer}
.edit-btn:active{background:var(--bg)}
.cb{padding:12px 16px 14px}

/* TODO */
.tsec{margin-bottom:12px}.tsec:last-child{margin-bottom:0}
.tlbl{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.tr{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px}
.tr.k1{background:var(--c1b);border-left:3px solid var(--c1)}
.tr.k2{background:var(--c2b);border-left:3px solid var(--c2)}
.tr.k3{background:var(--c3b);border-left:3px solid var(--c3)}
.chk{width:20px;height:20px;border-radius:4px;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid;transition:all .15s}
.chk.v1{border-color:var(--c1)}.chk.v2{border-color:var(--c2)}.chk.v3{border-color:var(--c3)}
.chk.on.v1{background:var(--c1);border-color:var(--c1)}
.chk.on.v2{background:var(--c2);border-color:var(--c2)}
.chk.on.v3{background:var(--c3);border-color:var(--c3)}
.chk.on::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-2px);display:block}
.tta{font-size:15px;line-height:1.5;flex:1;outline:none;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;resize:none;min-height:22px;color:var(--ink)}
.tta.done{color:var(--ink3)}
.addr{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:13px;color:var(--ink3);cursor:pointer;opacity:.5;margin-top:2px}
.addr:active{opacity:1}

/* SCHEDULE */
.sb{margin-bottom:10px}.sb:last-child{margin-bottom:0}
.slbl{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:6px 6px 0 0;display:inline-block;margin-bottom:2px;font-weight:500}
.slbl.a{background:var(--cab);color:var(--ca)}.slbl.b{background:var(--cbb);color:var(--cb)}
.slbl.c{background:var(--ccb);color:var(--cc)}.slbl.d{background:var(--cdb);color:var(--cd)}
.sta{width:100%;min-height:52px;border-radius:0 8px 8px 8px;padding:8px 12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--ink);resize:none;outline:none;border:none;line-height:1.6}
.sta.a{background:var(--cab)}.sta.b{background:var(--cbb)}.sta.c{background:var(--ccb)}.sta.d{background:var(--cdb)}
.sta::placeholder{color:var(--ink3);font-size:14px}

/* ROUTINE */
.rr{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:4px;background:var(--rtb);cursor:pointer}
.rr:active{filter:brightness(.96)}
.rchk{width:22px;height:22px;border-radius:5px;border:2px solid var(--rt);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.rchk.on{background:var(--rt);border-color:var(--rt)}
.rchk.on::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-2px);display:block}
.rlbl{font-size:15px;user-select:none}
.rlbl.done{text-decoration:line-through;color:var(--ink3)}
.rbwrap{margin-top:10px}
.rbbg{height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.rbfill{height:100%;background:linear-gradient(90deg,var(--rt),#f5c842);border-radius:4px;transition:width .3s}
.rpct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink3);text-align:right;margin-top:4px}

/* PROGRESS */
.pi{margin-bottom:16px}.pi:last-child{margin-bottom:0}
.ptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.pnm{font-size:15px;color:var(--ink);flex:1}
.ppct{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--pg);min-width:40px;text-align:right}
.segbar{display:flex;gap:3px}
.seg{height:10px;flex:1;border-radius:3px;background:var(--border);transition:background .15s;cursor:pointer}
.seg.on{background:var(--pg)}
.psl{width:100%;margin-top:8px;-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
.psl::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--pg);border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.2)}

/* DIARY */
.dta{width:100%;min-height:120px;background:var(--dyb);border:1px solid rgba(123,94,167,.18);border-radius:8px;padding:12px 14px;font-family:'Noto Serif KR',serif;font-size:15px;line-height:1.9;color:var(--ink);resize:none;outline:none}
.dta::placeholder{color:var(--ink3);font-style:italic;font-size:14px}

/* TAB BAR */
.tabbar{height:var(--th);background:var(--ink);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);transition:color .15s;padding:0}
.tab.active{color:#f5f0e8}
.tab-icon{font-size:20px;line-height:1}
.tab-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em}
.tab:active{color:rgba(255,255,255,.8)}

/* OVERLAY & MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(42,33,24,.6);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--paper);border-radius:16px 16px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.modal-head{display:flex;align-items:center;padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:500;color:var(--ink);flex:1}
.modal-close{background:transparent;border:none;font-size:20px;color:var(--ink3);cursor:pointer;padding:0 4px}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.edit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.edit-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.edit-row input[type=text]{flex:1;border:none;background:transparent;outline:none;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--ink)}
.edit-row .del-btn{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0}
.drag-handle{color:var(--ink3);font-size:16px;flex-shrink:0;user-select:none}
.add-input-wrap{display:flex;gap:8px}
.add-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;color:var(--ink)}
.add-confirm{border:none;background:var(--ink);color:#fff;border-radius:8px;padding:10px 18px;font-size:14px;font-family:'IBM Plex Mono',monospace;cursor:pointer}
.mbtn{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 0;border-radius:8px;cursor:pointer;flex:1;text-align:center;border:none}
.mbtn.cancel{background:var(--bg);border:1px solid var(--border);color:var(--ink2)}
.mbtn.ok{background:var(--ink);color:#fff}
.mbtn.ok:active{background:var(--ink2)}

/* SYNC MODAL */
.sync-sheet{background:var(--paper);border-radius:16px 16px 0 0;width:100%;padding:20px 20px calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px}
.sync-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:500;color:var(--ink);margin-bottom:2px}
.sync-action{width:100%;padding:14px 16px;border-radius:10px;border:none;font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left}
.sync-action.gist-up{background:#e8f5ee;color:#1a7a45}
.sync-action.gist-up:active{background:#d4edde}
.sync-action.gist-dn{background:#e8f0fc;color:#1a4fa0}
.sync-action.gist-dn:active{background:#d4e4f7}
.sync-action.setting{background:var(--bg);color:var(--ink2);border:1px solid var(--border)}
.sync-action.close-s{background:transparent;color:var(--ink3);border:1px solid var(--border);justify-content:center}
.sync-icon{font-size:20px;flex-shrink:0}
.sync-sub{font-size:12px;color:inherit;opacity:.7;display:block;margin-top:2px}
.gist-info{background:var(--bg);border-radius:8px;padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink3);line-height:1.6}
.gist-info.connected{color:#1a7a45;background:#e8f5ee}
.gist-info.disconnected{color:var(--ink3)}

/* SETTINGS MODAL (Gist 설정) */
.settings-sheet{background:var(--paper);border-radius:16px 16px 0 0;width:100%;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px}
.settings-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:500;color:var(--ink)}
.settings-desc{font-size:13px;color:var(--ink3);line-height:1.7}
.settings-field{display:flex;flex-direction:column;gap:6px}
.settings-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.settings-input{border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'IBM Plex Mono',monospace;outline:none;background:#fff;color:var(--ink);width:100%}
.settings-input:focus{border-color:var(--pg)}
.settings-row{display:flex;gap:10px}
.settings-btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-family:'IBM Plex Mono',monospace;cursor:pointer}
.settings-btn.cancel{background:var(--bg);border:1px solid var(--border);color:var(--ink2)}
.settings-btn.save{background:var(--ink);color:#fff}
.settings-btn.danger{background:#fdeee9;color:var(--c1);border:1px solid var(--c1)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--th) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#f5f0e8;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="hd">
  <span class="hd-title">대시보드</span>
  <div class="hd-nav">
    <button id="btnPrev">&#8249;</button>
    <div class="hd-date" id="hdDate">
      <input type="date" id="dateInput">
    </div>
    <button id="btnNext">&#8250;</button>
  </div>
  <div class="gist-status" id="gistStatus" title="Gist 연결 상태"></div>
  <button class="sync-btn" id="btnSync">&#8645; 동기화</button>
</header>

<div class="scroll" id="scrollArea">
  <div class="page active" id="page-todo">
    <div class="card">
      <div class="ch">
        <div class="cdot" style="background:var(--c1)"></div>
        <span class="clbl">할일 123</span>
        <span class="csub" id="tdCount"></span>
      </div>
      <div class="cb" style="padding-bottom:10px">
        <div class="tsec">
          <div class="tlbl" style="color:var(--c1)">&#9679; 반드시 1</div>
          <div id="k1"></div><div class="addr" id="add-k1">＋ 추가</div>
        </div>
        <div class="tsec">
          <div class="tlbl" style="color:var(--c2)">&#9679; 잊지말고 2</div>
          <div id="k2"></div><div class="addr" id="add-k2">＋ 추가</div>
        </div>
        <div class="tsec">
          <div class="tlbl" style="color:var(--c3)">&#9679; 하면좋은 3</div>
          <div id="k3"></div><div class="addr" id="add-k3">＋ 추가</div>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="page-sch">
    <div class="card">
      <div class="ch"><div class="cdot" style="background:var(--ca)"></div><span class="clbl">스케줄</span></div>
      <div class="cb">
        <div class="sb"><div class="slbl a">아침</div><textarea class="sta a" id="s-a" rows="2" placeholder="아침 일정…"></textarea></div>
        <div class="sb"><div class="slbl b">오전</div><textarea class="sta b" id="s-b" rows="2" placeholder="오전 일정…"></textarea></div>
        <div class="sb"><div class="slbl c">오후</div><textarea class="sta c" id="s-c" rows="2" placeholder="오후 일정…"></textarea></div>
        <div class="sb"><div class="slbl d">저녁</div><textarea class="sta d" id="s-d" rows="2" placeholder="저녁 일정…"></textarea></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-routine">
    <div class="card">
      <div class="ch">
        <div class="cdot" style="background:var(--rt)"></div>
        <span class="clbl">매일 루틴</span>
        <button class="edit-btn" id="btnEditRt">편집</button>
      </div>
      <div class="cb">
        <div id="rList"></div>
        <div class="rbwrap">
          <div class="rbbg"><div class="rbfill" id="rBar" style="width:0%"></div></div>
          <div class="rpct" id="rPct"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ch">
        <div class="cdot" style="background:var(--pg)"></div>
        <span class="clbl">진행사항</span>
        <button class="edit-btn" id="btnEditPg">편집</button>
      </div>
      <div class="cb" id="pList"></div>
    </div>
  </div>

  <div class="page" id="page-diary">
    <div class="card">
      <div class="ch"><div class="cdot" style="background:var(--dy)"></div><span class="clbl">간단 일기</span></div>
      <div class="cb"><textarea class="dta" id="dTa" placeholder="오늘 하루를 짧게 기록하세요…" rows="6"></textarea></div>
    </div>
  </div>
</div>

<nav class="tabbar">
  <button class="tab active" data-page="todo"><span class="tab-icon">✓</span><span class="tab-label">할일123</span></button>
  <button class="tab" data-page="sch"><span class="tab-icon">📅</span><span class="tab-label">스케줄</span></button>
  <button class="tab" data-page="routine"><span class="tab-icon">🔄</span><span class="tab-label">루틴</span></button>
  <button class="tab" data-page="diary"><span class="tab-icon">✏️</span><span class="tab-label">일기</span></button>
</nav>

<!-- 루틴 편집 모달 -->
<div class="overlay" id="modalRt">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">매일 루틴 편집</span><button class="modal-close" id="closeRt">&#10005;</button></div>
    <div class="modal-body">
      <div class="edit-list" id="rtEditList"></div>
      <div class="add-input-wrap"><input type="text" class="add-input" id="rtNewInput" placeholder="새 루틴 항목…"><button class="add-confirm" id="rtAddBtn">추가</button></div>
    </div>
    <div class="modal-footer"><button class="mbtn cancel" id="rtCancel">취소</button><button class="mbtn ok" id="rtSave">저장</button></div>
  </div>
</div>

<!-- 진행사항 편집 모달 -->
<div class="overlay" id="modalPg">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">진행사항 편집</span><button class="modal-close" id="closePg">&#10005;</button></div>
    <div class="modal-body">
      <div class="edit-list" id="pgEditList"></div>
      <div class="add-input-wrap"><input type="text" class="add-input" id="pgNewInput" placeholder="새 항목 이름…"><button class="add-confirm" id="pgAddBtn">추가</button></div>
    </div>
    <div class="modal-footer"><button class="mbtn cancel" id="pgCancel">취소</button><button class="mbtn ok" id="pgSave">저장</button></div>
  </div>
</div>

<!-- 동기화 시트 -->
<div class="overlay" id="modalSync">
  <div class="sync-sheet">
    <div class="sync-title">동기화</div>
    <div class="gist-info" id="gistInfo">Gist 미연결 — 설정에서 토큰과 Gist ID를 입력하세요</div>
    <button class="sync-action gist-up" id="syncUp">
      <span class="sync-icon">&#9650;</span>
      <span><strong>Gist에 저장</strong><span class="sync-sub">현재 데이터 → GitHub Gist 업로드</span></span>
    </button>
    <button class="sync-action gist-dn" id="syncDn">
      <span class="sync-icon">&#9660;</span>
      <span><strong>Gist에서 불러오기</strong><span class="sync-sub">GitHub Gist → 현재 기기에 로드</span></span>
    </button>
    <button class="sync-action" id="syncCSV" style="background:#f5f0fc;color:#5a3a8a;border:none">
      <span class="sync-icon">📄</span>
      <span><strong>CSV 백업</strong><span class="sync-sub">전체 데이터를 CSV 파일로 내보내기</span></span>
    </button>
    <button class="sync-action" id="syncReset" style="background:#fdeee9;color:#c0392b;border:none">
      <span class="sync-icon">🗑️</span>
      <span><strong>Gist 데이터 리셋</strong><span class="sync-sub">Gist 내용을 오늘 날짜만 남기고 초기화</span></span>
    </button>
    <button class="sync-action setting" id="syncSetting">
      <span class="sync-icon">⚙️</span>
      <span>Gist 설정</span>
    </button>

</div>

<!-- Gist 설정 시트 -->
<div class="overlay" id="modalSettings">
  <div class="settings-sheet">
    <div class="settings-title">Gist 연동 설정</div>
    <div class="settings-desc">GitHub Personal Access Token과 Gist ID를 입력하세요. 정보는 이 기기의 localStorage에만 저장되며 외부로 전송되지 않습니다.</div>
    <div class="settings-field">
      <div class="settings-label">GitHub Token (gist 권한)</div>
      <input type="password" class="settings-input" id="inputToken" placeholder="ghp_xxxxxxxxxxxx">
    </div>
    <div class="settings-field">
      <div class="settings-label">Gist ID</div>
      <input type="text" class="settings-input" id="inputGistId" placeholder="58741dae0faa...">
    </div>
    <div class="settings-row">
      <button class="settings-btn cancel" id="settingsCancel">취소</button>
      <button class="settings-btn save" id="settingsSave">저장</button>
    </div>
    <button class="settings-btn danger" id="settingsClear">연동 해제</button>
  </div>
</div>


<div class="toast" id="toast"></div>

<script>
var LS_KEY="dd_db", LS_CFG="dd_cfg", LS_TOKEN="dd_token", LS_GIST="dd_gist";
var SEGS=12;
var cur, db, cfg;
var gistToken="", gistId="";

var DEFAULT_CFG={
  routines:["자유롭게 글쓰기","워터픽 양치","푸쉬업바 잡기","식후 산책","저녁 샤워"],
  progNames:["나르치스와 골드문트(5/11)","공중그네(5/3, 5/16)","청킹멘션의 보스는 알고 있다(5/16)","태고의 시간들(5/22)","태도에 관하여(5/30)"]
};

function todayStr(){return new Date().toISOString().slice(0,10);}
function saveLS(){localStorage.setItem(LS_KEY,JSON.stringify(db));localStorage.setItem(LS_CFG,JSON.stringify(cfg));}

function getD(d){
  if(!db[d]){
    /* 가장 최근 날짜의 진행사항 % 이어받기 */
    var prevPct = cfg.progNames.map(function(){return 0;});
    var dates = Object.keys(db).sort();
    if(dates.length > 0){
      var latest = dates[dates.length-1];
      if(db[latest] && db[latest].prog){
        prevPct = cfg.progNames.map(function(n,i){
          return db[latest].prog[i] ? db[latest].prog[i].p : 0;
        });
      }
    }
    db[d]={
      todos:{k1:[{t:"",d:false}],k2:[{t:"",d:false},{t:"",d:false}],k3:[{t:"",d:false},{t:"",d:false},{t:"",d:false}]},
      sch:{a:"",b:"",c:"",d:""},
      rt:cfg.routines.map(function(){return false;}),
      prog:cfg.progNames.map(function(n,i){return {n:n,p:prevPct[i]};}),
      diary:""
    };
  }
  while(db[d].rt.length<cfg.routines.length) db[d].rt.push(false);
  db[d].rt=db[d].rt.slice(0,cfg.routines.length);
  while(db[d].prog.length<cfg.progNames.length) db[d].prog.push({n:cfg.progNames[db[d].prog.length]||"",p:0});
  db[d].prog=db[d].prog.slice(0,cfg.progNames.length);
  for(var i=0;i<db[d].prog.length;i++) db[d].prog[i].n=cfg.progNames[i];
  var mins={k1:1,k2:2,k3:3};
  ["k1","k2","k3"].forEach(function(k){
    if(!db[d].todos[k]) db[d].todos[k]=[];
    while(db[d].todos[k].length<mins[k]) db[d].todos[k].push({t:"",d:false});
  });
  return db[d];
}

/* ── RENDER ── */
function render(){
  var p=cur.split("-");
  document.getElementById("hdDate").childNodes[0].textContent=p[0]+"."+parseInt(p[1])+"."+parseInt(p[2]);
  document.getElementById("dateInput").value=cur;
  var v=getD(cur);
  renderTodos(v.todos); renderSch(v.sch); renderRt(v.rt); renderProg(v.prog);
  document.getElementById("dTa").value=v.diary;
}

function renderTodos(todos){
  ["k1","k2","k3"].forEach(function(k){
    var el=document.getElementById(k); el.innerHTML="";
    (todos[k]||[]).forEach(function(item,idx){el.appendChild(mkTr(k,item,idx));});
  });
  cntTodos(todos);
}
function mkTr(k,item,idx){
  var vmap={k1:"v1",k2:"v2",k3:"v3"},v=vmap[k];
  var mins={k1:1,k2:2,k3:3};
  var row=document.createElement("div"); row.className="tr "+k;
  var chk=document.createElement("div"); chk.className="chk "+v+(item.d?" on":"");
  chk.onclick=function(){item.d=!item.d;chk.className="chk "+v+(item.d?" on":"");ta.className="tta"+(item.d?" done":"");cntTodos(getD(cur).todos);saveLS();};
  var ta=document.createElement("textarea"); ta.className="tta"+(item.d?" done":""); ta.value=item.t; ta.rows=1;
  ta.placeholder=k==="k1"?"반드시 할 일…":k==="k2"?"잊지 말고…":"하면 좋을…";
  ta.oninput=function(){item.t=ta.value;ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";saveLS();};
  ta.onkeydown=function(e){if(e.key==="Enter")e.preventDefault();};
  setTimeout(function(){ta.style.height="auto";ta.style.height=Math.max(ta.scrollHeight,22)+"px";},0);
  var del=document.createElement("button");
  del.style.cssText="background:transparent;border:none;color:var(--ink3);font-size:16px;padding:0 4px;cursor:pointer;flex-shrink:0;opacity:.4;line-height:1";
  del.innerHTML="&#10005;";
  del.onclick=function(){
    var list=getD(cur).todos[k];
    if(list.length<=mins[k]){showToast("최소 "+mins[k]+"개는 유지돼요");return;}
    list.splice(idx,1);
    renderTodos(getD(cur).todos);
    saveLS();
  };
  row.appendChild(chk); row.appendChild(ta); row.appendChild(del);
  return row;
}
function addTodo(k){
  getD(cur).todos[k].push({t:"",d:false}); renderTodos(getD(cur).todos); saveLS();
  setTimeout(function(){var rows=document.getElementById(k).querySelectorAll("textarea");if(rows.length)rows[rows.length-1].focus();},50);
}
function cntTodos(todos){
  var all=[].concat(todos.k1||[],todos.k2||[],todos.k3||[]).filter(function(t){return t.t;});
  var done=all.filter(function(t){return t.d;}).length;
  document.getElementById("tdCount").textContent=all.length?(done+"/"+all.length):"";
}

function renderSch(sch){
  [{id:"s-a",k:"a"},{id:"s-b",k:"b"},{id:"s-c",k:"c"},{id:"s-d",k:"d"}].forEach(function(x){
    var el=document.getElementById(x.id); el.value=sch[x.k]||"";
    el.oninput=function(){getD(cur).sch[x.k]=el.value;saveLS();};
  });
}

function renderRt(states){
  var list=document.getElementById("rList"); list.innerHTML="";
  var grid=document.createElement("div");
  grid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:6px";
  cfg.routines.forEach(function(name,i){
    var row=document.createElement("div"); row.className="rr";
    row.style.cssText="margin-bottom:0;overflow:hidden";
    row.onclick=function(){states[i]=!states[i];renderRt(states);saveLS();};
    var chk=document.createElement("div"); chk.className="rchk"+(states[i]?" on":"");
    var lbl=document.createElement("span"); lbl.className="rlbl"+(states[i]?" done":"");
    lbl.textContent=name;
    lbl.style.cssText="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px";
    row.appendChild(chk); row.appendChild(lbl); grid.appendChild(row);
  });
  list.appendChild(grid);
  var done=states.filter(function(x){return x;}).length;
  document.getElementById("rBar").style.width=Math.round(done/Math.max(cfg.routines.length,1)*100)+"%";
  document.getElementById("rPct").textContent=done+" / "+cfg.routines.length+" 완료";
}

function renderProg(items){
  var list=document.getElementById("pList"); list.innerHTML="";
  if(!cfg.progDates) cfg.progDates={};
  items.forEach(function(item){
    var wrap=document.createElement("div"); wrap.className="pi";
    var top=document.createElement("div"); top.className="ptop";

    /* 날짜 태그 — 클릭하면 date input으로 변경 가능 */
    var dateStr="";
    if(cfg.progDates[item.n]){
      var parts=cfg.progDates[item.n].split("-");
      dateStr=parseInt(parts[1])+"/"+parseInt(parts[2]);
    }
    var nm=document.createElement("span"); nm.className="pnm";
    nm.style.cssText="display:flex;align-items:center;gap:5px;flex:1;min-width:0";

    var dateTag=document.createElement("span");
    dateTag.textContent=dateStr||"날짜";
    dateTag.style.cssText="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink3);background:var(--border);padding:1px 6px;border-radius:3px;cursor:pointer;flex-shrink:0;white-space:nowrap";
    dateTag.title="탭해서 날짜 변경";
    dateTag.onclick=function(){
      var inp=document.createElement("input");
      inp.type="text"; inp.placeholder="M/D (예: 4/30)";
      inp.value=dateStr||"";
      inp.style.cssText="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);background:#fff;padding:1px 6px;border-radius:3px;border:1px solid var(--pg);width:60px;outline:none";
      dateTag.replaceWith(inp);
      inp.focus(); inp.select();
      function commit(){
        var val=inp.value.trim();
        var m,d;
        /* M/D 또는 M-D 파싱 */
        var match=val.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
        if(match){
          m=parseInt(match[1]); d=parseInt(match[2]);
          var year=new Date().getFullYear();
          var iso=year+"-"+(m<10?"0":"")+m+"-"+(d<10?"0":"")+d;
          cfg.progDates[item.n]=iso;
          dateStr=m+"/"+d;
          saveLS();
        }
        var newTag=document.createElement("span");
        newTag.textContent=dateStr||"날짜";
        newTag.style.cssText=dateTag.style.cssText;
        newTag.onclick=dateTag.onclick;
        inp.replaceWith(newTag);
        dateTag=newTag;
      }
      inp.onblur=commit;
      inp.onkeydown=function(e){if(e.key==="Enter")commit();if(e.key==="Escape"){inp.replaceWith(dateTag);}};
    };

    var nameSpan=document.createElement("span");
    nameSpan.textContent=item.n;
    nameSpan.style.cssText="overflow:hidden;text-overflow:ellipsis;white-space:nowrap";

    nm.appendChild(dateTag);
    nm.appendChild(nameSpan);

    var pctEl=document.createElement("div"); pctEl.className="ppct";
    pctEl.textContent=item.p+"%";
    pctEl.title="탭해서 직접 입력";
    pctEl.style.cursor="pointer";
    pctEl.onclick=function(){
      var inp=document.createElement("input");
      inp.type="number"; inp.min=0; inp.max=100; inp.value=item.p;
      inp.style.cssText="font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--pg);width:52px;border:1px solid var(--pg);border-radius:4px;padding:1px 4px;outline:none;text-align:right";
      pctEl.replaceWith(inp);
      inp.focus(); inp.select();
      function commit(){
        var val=Math.min(100,Math.max(0,parseInt(inp.value)||0));
        item.p=val;
        pctEl.textContent=val+"%";
        inp.replaceWith(pctEl);
        bar.querySelectorAll(".seg").forEach(function(sg,i){sg.className="seg"+(i<Math.round(val/100*SEGS)?" on":"");});
        sl.value=val;
        saveLS();
      }
      inp.onblur=commit;
      inp.onkeydown=function(e){if(e.key==="Enter")commit();if(e.key==="Escape"){inp.replaceWith(pctEl);}};
    };
    top.appendChild(nm); top.appendChild(pctEl);

    var bar=document.createElement("div"); bar.className="segbar";
    for(var s=0;s<SEGS;s++){(function(s){
      var seg=document.createElement("div"); seg.className="seg"+(s<Math.round(item.p/100*SEGS)?" on":"");
      seg.onclick=function(){item.p=Math.round((s+1)/SEGS*100);renderProg(items);saveLS();};
      bar.appendChild(seg);
    })(s);}
    var sl=document.createElement("input"); sl.type="range"; sl.min=0; sl.max=100; sl.step=1; sl.value=item.p; sl.className="psl";
    sl.oninput=function(){
      item.p=parseInt(sl.value); pctEl.textContent=item.p+"%";
      bar.querySelectorAll(".seg").forEach(function(sg,i){sg.className="seg"+(i<Math.round(item.p/100*SEGS)?" on":"");});
      saveLS();
    };
    wrap.appendChild(top); wrap.appendChild(bar); wrap.appendChild(sl); list.appendChild(wrap);
  });
}

function collect(){getD(cur).diary=document.getElementById("dTa").value;saveLS();}
function changeDate(delta){collect();var d=new Date(cur);d.setDate(d.getDate()+delta);cur=d.toISOString().slice(0,10);render();}

function switchTab(page){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("active",t.dataset.page===page);});
  document.querySelectorAll(".page").forEach(function(p){p.classList.toggle("active",p.id==="page-"+page);});
  document.getElementById("scrollArea").scrollTop=0;
}

/* ── GIST ── */
function setGistStatus(state){
  var el=document.getElementById("gistStatus");
  el.className="gist-status"+(state?" "+state:"");
}

function updateGistInfo(){
  var el=document.getElementById("gistInfo");
  if(gistToken && gistId){
    el.className="gist-info connected";
    el.textContent="✓ Gist 연결됨 — ID: "+gistId.slice(0,8)+"...";
    setGistStatus("ok");
  } else {
    el.className="gist-info disconnected";
    el.textContent="Gist 미연결 — 설정에서 토큰과 Gist ID를 입력하세요";
    setGistStatus("");
  }
}

function gistUpload(){
  if(!gistToken||!gistId){showToast("Gist 설정이 필요해요");openSettings();return;}
  collect();
  setGistStatus("loading");
  var payload=JSON.stringify({db:db,cfg:cfg},null,2);
  fetch("https://api.github.com/gists/"+gistId,{
    method:"PATCH",
    headers:{"Authorization":"token "+gistToken,"Content-Type":"application/json"},
    body:JSON.stringify({files:{"dashboard-sync.json":{content:payload}}})
  }).then(function(r){
    if(r.ok){setGistStatus("ok");showToast("Gist 저장 완료 ✓");}
    else{setGistStatus("err");showToast("저장 실패 — 토큰/ID 확인");}
  }).catch(function(){setGistStatus("err");showToast("네트워크 오류");});
}

function gistDownload(){
  if(!gistToken||!gistId){showToast("Gist 설정이 필요해요");openSettings();return;}
  setGistStatus("loading");
  fetch("https://api.github.com/gists/"+gistId,{
    headers:{"Authorization":"token "+gistToken}
  }).then(function(r){return r.json();})
  .then(function(data){
    var file=data.files&&data.files["dashboard-sync.json"];
    if(!file){setGistStatus("err");showToast("파일을 찾을 수 없어요");return;}
    var parsed=JSON.parse(file.content);
    if(parsed.db) Object.keys(parsed.db).forEach(function(k){db[k]=parsed.db[k];});
    if(parsed.cfg) cfg=parsed.cfg;
    saveLS(); render();
    setGistStatus("ok"); showToast("불러오기 완료 ✓");
  }).catch(function(){setGistStatus("err");showToast("불러오기 실패");});
}

/* ── 설정 모달 ── */
function openSettings(){
  document.getElementById("inputToken").value=gistToken||"";
  document.getElementById("inputGistId").value=gistId||"";
  document.getElementById("modalSettings").classList.add("open");
}
function closeSettings(){document.getElementById("modalSettings").classList.remove("open");}
function saveSettings(){
  gistToken=document.getElementById("inputToken").value.trim();
  gistId=document.getElementById("inputGistId").value.trim();
  localStorage.setItem(LS_TOKEN,gistToken);
  localStorage.setItem(LS_GIST,gistId);
  updateGistInfo();
  closeSettings();
  showToast("설정 저장됨 ✓");
}
function clearSettings(){
  gistToken=""; gistId="";
  localStorage.removeItem(LS_TOKEN); localStorage.removeItem(LS_GIST);
  updateGistInfo(); closeSettings(); showToast("연동 해제됨");
}

/* ── 루틴 모달 ── */
var rtTemp=[];
function openRtModal(){rtTemp=cfg.routines.slice();buildRtList();document.getElementById("rtNewInput").value="";document.getElementById("modalRt").classList.add("open");}
function closeRtModal(){document.getElementById("modalRt").classList.remove("open");}
function buildRtList(){
  var list=document.getElementById("rtEditList"); list.innerHTML="";
  rtTemp.forEach(function(name,i){
    var row=document.createElement("div"); row.className="edit-row";
    var h=document.createElement("span"); h.className="drag-handle"; h.textContent="⠿";
    var inp=document.createElement("input"); inp.type="text"; inp.value=name; inp.oninput=function(){rtTemp[i]=inp.value;};
    var del=document.createElement("button"); del.className="del-btn"; del.innerHTML="&#10005;"; del.onclick=function(){rtTemp.splice(i,1);buildRtList();};
    row.appendChild(h); row.appendChild(inp); row.appendChild(del); list.appendChild(row);
  });
}
function rtAdd(){var v=document.getElementById("rtNewInput").value.trim();if(!v)return;rtTemp.push(v);buildRtList();document.getElementById("rtNewInput").value="";}
function rtSaveAndClose(){
  cfg.routines=rtTemp.filter(function(x){return x.trim();});
  Object.keys(db).forEach(function(d){while(db[d].rt.length<cfg.routines.length)db[d].rt.push(false);db[d].rt=db[d].rt.slice(0,cfg.routines.length);});
  saveLS(); renderRt(getD(cur).rt); closeRtModal(); showToast("루틴 저장됨 ✓");
}

/* ── 진행사항 모달 ── */
var pgTemp=[];
function openPgModal(){pgTemp=cfg.progNames.slice();buildPgList();document.getElementById("pgNewInput").value="";document.getElementById("modalPg").classList.add("open");}
function closePgModal(){document.getElementById("modalPg").classList.remove("open");}
function buildPgList(){
  var list=document.getElementById("pgEditList"); list.innerHTML="";
  pgTemp.forEach(function(name,i){
    var row=document.createElement("div"); row.className="edit-row";
    var h=document.createElement("span"); h.className="drag-handle"; h.textContent="⠿";
    var inp=document.createElement("input"); inp.type="text"; inp.value=name; inp.oninput=function(){pgTemp[i]=inp.value;};
    var del=document.createElement("button"); del.className="del-btn"; del.innerHTML="&#10005;"; del.onclick=function(){pgTemp.splice(i,1);buildPgList();};
    row.appendChild(h); row.appendChild(inp); row.appendChild(del); list.appendChild(row);
  });
}
function pgAdd(){var v=document.getElementById("pgNewInput").value.trim();if(!v)return;pgTemp.push(v);buildPgList();document.getElementById("pgNewInput").value="";}
function pgSaveAndClose(){
  cfg.progNames=pgTemp.filter(function(x){return x.trim();});
  /* 등록일 기록 — 새 항목만 오늘 날짜 부여 */
  if(!cfg.progDates) cfg.progDates={};
  cfg.progNames.forEach(function(n){
    if(!cfg.progDates[n]) cfg.progDates[n]=todayStr();
  });
  Object.keys(db).forEach(function(d){
    var oldProg=db[d].prog||[];
    db[d].prog=cfg.progNames.map(function(n,i){
      var found=oldProg.filter(function(p){return p.n===n;})[0];
      return {n:n, p:found?found.p:0};
    });
  });
  saveLS(); renderProg(getD(cur).prog); closePgModal(); showToast("진행사항 저장됨 ✓");
}

/* ── CSV 내보내기 ── */
function exportCSV(){
  collect();
  var rows=[["날짜","섹션","항목","완료여부","내용"]];
  Object.keys(db).sort().forEach(function(date){
    var v=db[date];
    /* 할일 */
    [["k1","반드시1"],["k2","잊지말고2"],["k3","하면좋은3"]].forEach(function(x){
      (v.todos[x[0]]||[]).forEach(function(t){
        if(t.t) rows.push([date,"할일_"+x[1],t.t,t.d?"완료":"미완",""]);
      });
    });
    /* 스케줄 */
    [["a","아침"],["b","오전"],["c","오후"],["d","저녁"]].forEach(function(x){
      if(v.sch[x[0]]) rows.push([date,"스케줄",x[1],"",v.sch[x[0]].replace(/\n/g," ")]);
    });
    /* 루틴 */
    cfg.routines.forEach(function(r,i){
      rows.push([date,"루틴",r,v.rt[i]?"완료":"미완",""]);
    });
    /* 진행사항 */
    (v.prog||[]).forEach(function(p){
      rows.push([date,"진행사항",p.n,"",p.p+"%"]);
    });
    /* 일기 */
    if(v.diary) rows.push([date,"일기","","",v.diary.replace(/\n/g," ")]);
  });

  var csv=rows.map(function(r){
    return r.map(function(c){
      return '"'+String(c).replace(/"/g,'""')+'"';
    }).join(",");
  }).join("\n");

  /* BOM 추가 — 한글 엑셀 깨짐 방지 */
  var bom="\uFEFF";
  var blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="dashboard-backup.csv";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast("CSV 백업 완료 ✓");
}

/* ── Gist 리셋 ── */
function gistReset(){
  if(!gistToken||!gistId){showToast("Gist 설정이 필요해요");return;}
  if(!confirm("Gist 데이터를 리셋할까요?\n오늘 날짜 데이터만 남기고 모두 삭제됩니다.\nCSV 백업을 먼저 받으세요.")){return;}
  /* 오늘 데이터만 남기기 */
  var today=todayStr();
  var fresh={};
  if(db[today]) fresh[today]=db[today];
  db=fresh;
  saveLS();
  /* Gist에도 반영 */
  var payload=JSON.stringify({db:db,cfg:cfg},null,2);
  setGistStatus("loading");
  fetch("https://api.github.com/gists/"+gistId,{
    method:"PATCH",
    headers:{"Authorization":"token "+gistToken,"Content-Type":"application/json"},
    body:JSON.stringify({files:{"dashboard-sync.json":{content:payload}}})
  }).then(function(r){
    if(r.ok){setGistStatus("ok");render();showToast("리셋 완료 ✓ 오늘 데이터만 남았어요");}
    else{setGistStatus("err");showToast("Gist 업로드 실패");}
  }).catch(function(){setGistStatus("err");showToast("네트워크 오류");});
}

function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
document.addEventListener("DOMContentLoaded",function(){
  db={}; cfg=JSON.parse(JSON.stringify(DEFAULT_CFG));
  try{var sd=localStorage.getItem(LS_KEY);if(sd)db=JSON.parse(sd);}catch(e){}
  try{var sc=localStorage.getItem(LS_CFG);if(sc)cfg=JSON.parse(sc);}catch(e){}
  gistToken=localStorage.getItem(LS_TOKEN)||"";
  gistId=localStorage.getItem(LS_GIST)||"";

  /* 기존 진행사항 항목에 날짜 없으면 오늘로 초기화 */
  if(!cfg.progDates) cfg.progDates={};
  cfg.progNames.forEach(function(n){
    if(!cfg.progDates[n]) cfg.progDates[n]=todayStr();
  });

  cur=todayStr();
  if(!db[cur]) saveLS();
  updateGistInfo();

  /* 버튼 이벤트 */
  document.getElementById("btnPrev").onclick=function(){changeDate(-1);};
  document.getElementById("btnNext").onclick=function(){changeDate(1);};
  document.getElementById("dateInput").onchange=function(){collect();cur=this.value;render();};
  document.getElementById("dTa").oninput=function(){getD(cur).diary=this.value;saveLS();};
  document.getElementById("add-k1").onclick=function(){addTodo("k1");};
  document.getElementById("add-k2").onclick=function(){addTodo("k2");};
  document.getElementById("add-k3").onclick=function(){addTodo("k3");};

  document.querySelectorAll(".tab").forEach(function(btn){
    btn.onclick=function(){switchTab(btn.dataset.page);};
  });

  /* 동기화 모달 */
  document.getElementById("btnSync").onclick=function(){document.getElementById("modalSync").classList.add("open");};
  document.getElementById("syncClose").onclick=function(){document.getElementById("modalSync").classList.remove("open");};
  document.getElementById("modalSync").onclick=function(e){if(e.target===this)document.getElementById("modalSync").classList.remove("open");};
  document.getElementById("syncUp").onclick=function(){gistUpload();document.getElementById("modalSync").classList.remove("open");};
  document.getElementById("syncDn").onclick=function(){gistDownload();document.getElementById("modalSync").classList.remove("open");};
  document.getElementById("syncCSV").onclick=function(){exportCSV();document.getElementById("modalSync").classList.remove("open");};
  document.getElementById("syncReset").onclick=function(){document.getElementById("modalSync").classList.remove("open");gistReset();};
  document.getElementById("syncSetting").onclick=function(){document.getElementById("modalSync").classList.remove("open");openSettings();};

  /* 설정 모달 */
  document.getElementById("settingsCancel").onclick=closeSettings;
  document.getElementById("settingsSave").onclick=saveSettings;
  document.getElementById("settingsClear").onclick=clearSettings;
  document.getElementById("modalSettings").onclick=function(e){if(e.target===this)closeSettings();};

  /* 루틴 모달 */
  document.getElementById("btnEditRt").onclick=openRtModal;
  document.getElementById("closeRt").onclick=closeRtModal;
  document.getElementById("rtCancel").onclick=closeRtModal;
  document.getElementById("rtSave").onclick=rtSaveAndClose;
  document.getElementById("rtAddBtn").onclick=rtAdd;
  document.getElementById("rtNewInput").onkeydown=function(e){if(e.key==="Enter")rtAdd();};
  document.getElementById("modalRt").onclick=function(e){if(e.target===this)closeRtModal();};

  /* 진행사항 모달 */
  document.getElementById("btnEditPg").onclick=openPgModal;
  document.getElementById("closePg").onclick=closePgModal;
  document.getElementById("pgCancel").onclick=closePgModal;
  document.getElementById("pgSave").onclick=pgSaveAndClose;
  document.getElementById("pgAddBtn").onclick=pgAdd;
  document.getElementById("pgNewInput").onkeydown=function(e){if(e.key==="Enter")pgAdd();};
  document.getElementById("modalPg").onclick=function(e){if(e.target===this)closePgModal();};

  render();

  /* Gist 연결돼 있으면 자동으로 최신 데이터 로드 */
  if(gistToken && gistId){
    setTimeout(function(){gistDownload();},500);
  }
});
